<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
</head>


<body class="bg-secondary-subtle d-flex align-items-center justify-content-center min-vh-100">
  <div class="bg-white rounded-3 shadow" style="max-width: 900px; width: 100%;">

    <!--header-->
    <div class="px-4 pt-4 pb-2 border-bottom">
      <span class="fw-bold fs-5 mb-0">Payment form example</span>
    </div>

    <form>

      <!--body-->
      <div class="px-4 py-3">

        <!--ALert Fields-->
        <div class="alert py-2 px-3 mb-3" role="alert"
          style="background-color: rgb(241, 157, 157); border-color: rgb(143, 15, 15); color:rgb(50, 8, 8);">Some
          fields are missing</div>

        <!--3 grid-->

        <!--card-->
        <div class="row g-3 mb-3">

          <div class="col-12 col-sm-6">
            <label class="form-label small mb-1">Card#</label>
            <input type="number" class="form-control" placeholder="xxxxxxx" required />
          </div>

          <div class="col-12 col-sm-3">
            <label class="form-label small mb-1">CVC#</label>
            <input type="number" class="form-control" placeholder="xxxxxxx" required />
          </div>



          <div class="col-12 col-sm-3">
            <label class="form-label small mb-1">Amount#</label>
            <div class="input-group">
              <span class="input-group-text">€</span>
              <input type="number" class="form-control" placeholder="0.00" required />
            </div>
          </div>
        </div>

        <!--First & Last Name-->

        <div class="row g-3 mb-3">

          <div class="col-12 col-sm-6">
            <label class="form-label small mb-1">First Name</label>
            <input type="text" class="form-control" placeholder="name" required />
          </div>

          <div class="col-12 col-sm-6">
            <label class="form-label small mb-1">Last Name</label>
            <input type="text" class="form-control" placeholder="last name" required />
          </div>
        </div>


        <!-- Row 3: City - State - Postal Code -->
        <div class="row g-3 mb-3">

          <div class="col-12 col-sm-6">
            <label class="form-label small mb-1">City</label>
            <input type="text" class="form-control" required />
          </div>

          <div class="col-12 col-sm-3">
            <label class="form-label small mb-1">State</label>
            <select class="form-select" required>
              <option value="">Pick a state</option>
              <option>California</option>
              <option>Texas</option>
              <option>New York</option>
              <option>Florida</option>
            </select>
          </div>

          <div class="col-12 col-sm-3">
            <label class="form-label small mb-1">Postal Code</label>
            <input type="number" class="form-control" required />
          </div>

        </div>

        <!--Row 4 We accept & Message-->


        <div class="row g-3">

          <div class="col-12 col-sm-6">

            <label class="form-label small mb-1">We accept:</label>

            <div class="d-flex gap-1 flex-wrap p-2 rounded-3 col-sm-8" style="background-color: rgb(213, 215, 217);">

              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="paymentMethod" id="exampleRadios1" value="visa"
                  checked>
                <label class="form-check-label" for="exampleRadios1">
                  <i class="bi bi-credit-card-2-front"></i>
                </label>
              </div>

              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="paymentMethod" id="exampleRadios2" value="bank">
                <label class="form-check-label" for="exampleRadios2">
                  </i><i class="bi bi-bank"></i>
                </label>
              </div>

              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="paymentMethod" id="exampleRadios3" value="disc">
                <label class="form-check-label" for="exampleRadios3">
                  <i class="bi bi-disc"></i>
                </label>
              </div>

              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="paymentMethod" id="exampleRadios4" value="tv">
                <label class="form-check-label" for="exampleRadios4">
                  <i class="bi bi-tv"></i>
                </label>
              </div>
            </div>
          </div> <!--col We Accept end-->

          <!--Message-->
          <div class="col-12 col-sm-6">
            <label class="form-label small mb-1">Message</label>
            <div class="input-group">
              <textarea class="form-control" rows="3" placeholder="Add any notes here."></textarea>
            </div>
          </div>

        </div> <!--end row g-3-->

        <!-- Footer -->
        <div class="px-4 py-3 border-top d-flex justify-content-end gap-2 bg-light rounded-bottom-3">
          <button type="reset" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Send</button>
        </div>
    </form>

  </div><!-- /body -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
